<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voya AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* 1. Reset & Background Fix */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            width: 100%;
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('/static/forestpic.jpeg');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            display: flex;
            flex-direction: column;
            font-family: sans-serif;
        }

        /* 2. Glassmorphism UI Elements */
        .glass-panel {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
        }

        /* 3. FIXED CARD SIZE STYLES */
        .fixed-card {
            width: 350px;           /* Fixed Width */
            height: 450px;          /* Fixed Height */
            background: white;
            border-radius: 32px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .scan-container { 
            position: relative; 
            overflow: hidden; 
            height: 250px;          /* Fixed Image Height */
            flex-shrink: 0;         /* Prevent image from squashing */
        }

        .scan-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* 4. SCROLLABLE BIO AREA */
        .card-bio-area {
            flex-grow: 1;
            overflow-y: auto;       /* Scroll if text is too long */
            margin-bottom: 10px;
            padding-right: 4px;
        }

        /* Custom Scrollbar */
        .card-bio-area::-webkit-scrollbar { width: 4px; }
        .card-bio-area::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }

        #main-content {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }

        .hero-section {
            text-align: center;
            color: white;
            max-width: 400px;
            padding: 40px 20px;
        }

        .pulse-button {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #2ecc71;
            color: white;
            padding: 12px 28px;
            border-radius: 50px;
            font-weight: bold;
            margin-top: 20px;
            cursor: pointer;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 15px rgba(46, 204, 113, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 204, 113, 0); }
        }

        .scan-line {
            position: absolute;
            width: 100%;
            height: 4px;
            background: #2ecc71;
            box-shadow: 0 0 15px #2ecc71;
            top: 0;
            z-index: 10;
            animation: scanMove 2s linear infinite;
        }
        @keyframes scanMove {
            0% { top: 0; }
            100% { top: 100%; }
        }

        .badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            color: white;
        }
        .bg-desert { background: #d35400; }
        .bg-ocean { background: #2980b9; }
        .bg-forest { background: #27ae60; }

        .status-bar { height: 6px; background: rgba(0,0,0,0.1); border-radius: 10px; overflow: hidden; margin-top: 8px; }
        .status-fill { height: 100%; background: #2ecc71; border-radius: 10px; }

        nav { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(5px); }
    </style>
</head>
<body>

    <header class="bg-white/90 backdrop-blur-md shadow-sm p-4 flex justify-between items-center z-50">
        <h1 class="text-xl font-bold text-green-800 flex items-center gap-2">
            <i data-lucide="map"></i> Voya AI
        </h1>
        <button onclick="window.location.reload()" class="p-2 text-gray-500 hover:text-green-600">
            <i data-lucide="rotate-ccw"></i>
        </button>
    </header>

    <main id="main-content">
        <div id="hero-area" class="hero-section glass-panel">
            <h2 class="text-3xl font-bold mb-2">Discover the Wild</h2>
            <p class="text-gray-200 text-sm mb-6">Upload a photo to identify creatures and unlock their secrets.</p>
            <label for="file-input" class="pulse-button">
                <i data-lucide="camera"></i> Start Scanning
            </label>
            <input type="file" id="file-input" class="hidden" accept="image/*" onchange="handleFileUpload(event)">
        </div>
    
        <div id="deck-area" class="hidden flex flex-col items-center">
            <div id="card-render-target"></div>
            
            <div class="flex justify-center gap-10 mt-6">
                <button onclick="prevCard()" class="bg-white/20 p-3 rounded-full text-white hover:bg-white/40">
                    <i data-lucide="chevron-left"></i>
                </button>
                <button onclick="nextCard()" class="bg-white/20 p-3 rounded-full text-white hover:bg-white/40">
                    <i data-lucide="chevron-right"></i>
                </button>
            </div>
        </div>
    
        <div id="explore-area" class="hidden w-full max-w-md">
            <div class="glass-panel p-6">
                <h2 class="text-xl font-bold mb-4 text-white">Registry Search</h2>
                <div class="flex gap-2 mb-4">
                    <input type="text" id="search-input" placeholder="Search the zoo..." 
                           class="flex-grow p-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-white/50 outline-none">
                    <button onclick="handleSearch()" class="bg-green-500 text-white p-3 rounded-xl">
                        <i data-lucide="search"></i>
                    </button>
                </div>
                <div id="search-results" class="grid grid-cols-1 gap-3 max-h-[300px] overflow-y-auto pr-2"></div>
            </div>
        </div>
    </main>
    
    <nav class="p-4 flex justify-around items-center border-t border-white/10 bg-black/20 backdrop-blur-md">
        <button onclick="toggleView('hero')" class="flex flex-col items-center text-white/70 hover:text-green-400">
            <i data-lucide="home"></i><span class="text-[10px] mt-1">Home</span>
        </button>
        <button onclick="showAlloyDBCards()" class="flex flex-col items-center text-white/70 hover:text-green-400">
            <i data-lucide="paw-print"></i><span class="text-[10px] mt-1">Animals</span>
        </button>
        <button onclick="toggleView('explore')" class="flex flex-col items-center text-white/70 hover:text-green-400">
            <i data-lucide="compass"></i><span class="text-[10px] mt-1">Explore</span>
        </button>
    </nav>
    
    <script>
        lucide.createIcons();
        let items = {{ items | tojson | safe if items else '[]' }};
        let currentIdx = 0;
    
        function toggleView(view) {
            document.getElementById('hero-area').classList.add('hidden');
            document.getElementById('deck-area').classList.add('hidden');
            document.getElementById('explore-area').classList.add('hidden');
            document.getElementById(view + '-area').classList.remove('hidden');
            lucide.createIcons();
        }
    
        function showAlloyDBCards() {
            if (items.length > 0) {
                currentIdx = 0;
                renderCard(items[currentIdx]);
                toggleView('deck');
            } else {
                alert("The zoo is currently empty. Try uploading a photo!");
            }
        }
    
        function nextCard() {
            if (currentIdx < items.length - 1) {
                currentIdx++;
                renderCard(items[currentIdx]);
            }
        }
    
        function prevCard() {
            if (currentIdx > 0) {
                currentIdx--;
                renderCard(items[currentIdx]);
            }
        }
    
        function renderCard(item, isScanning = false) {
            const target = document.getElementById('card-render-target');
            let badgeClass = (item.bio && item.bio.toLowerCase().includes("desert")) ? "bg-desert" : 
                             (item.bio && item.bio.toLowerCase().includes("ocean")) ? "bg-ocean" : "bg-forest";
    
            target.innerHTML = `
                <div class="fixed-card animate-in fade-in zoom-in duration-300">
                    <div class="scan-container">
                        ${isScanning ? '<div class="scan-line"></div>' : ''}
                        <img src="${item.image_url}" onerror="this.src='https://placehold.co/400x300?text=Creature+Photo'">
                        <div class="absolute top-4 left-4">
                            <span class="badge ${badgeClass}">${item.category || 'Resident'}</span>
                        </div>
                    </div>
                    <div class="p-6 flex flex-col flex-grow overflow-hidden">
                        <h3 class="text-2xl font-bold text-gray-800 truncate">${item.title || item.common_name}</h3>
                        <p class="text-green-600 text-sm font-medium italic mb-2 truncate">${item.subtitle || item.scientific_name || ''}</p>
                        <div class="card-bio-area">
                            <p class="text-gray-600 text-sm leading-relaxed">${item.bio}</p>
                        </div>
                        <div class="mt-auto pt-2">
                            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-wider mb-1">Conservation Status Bar</p>
                            <div class="status-bar">
                                <div class="status-fill" style="width: 85%"></div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            lucide.createIcons();
        }
    
        async function handleSearch() {
            const query = document.getElementById('search-input').value;
            const resDiv = document.getElementById('search-results');
            if (!query) return;
            resDiv.innerHTML = '<div class="text-white text-center"><i data-lucide="loader" class="animate-spin mx-auto"></i></div>';
            lucide.createIcons();
            try {
                const response = await fetch(`/api/search?query=${encodeURIComponent(query)}`);
                const hits = await response.json();
                resDiv.innerHTML = hits.length ? '' : '<p class="text-white/60 text-center">No creatures found.</p>';
                hits.forEach(hit => {
                    const div = document.createElement('div');
                    div.className = "bg-white/10 p-3 rounded-lg border border-white/10 flex items-center gap-3 cursor-pointer hover:bg-white/20";
                    div.onclick = () => { items = [hit]; showAlloyDBCards(); };
                    div.innerHTML = `<img src="${hit.image_url}" class="w-12 h-12 rounded-lg object-cover">
                                     <div><p class="text-white font-bold text-sm">${hit.title || hit.common_name}</p>
                                     <p class="text-white/50 text-xs">${hit.category}</p></div>`;
                    resDiv.appendChild(div);
                });
            } catch (err) { resDiv.innerHTML = '<p class="text-red-400 text-xs">Search failed.</p>'; }
            lucide.createIcons();
        }

        async function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;
            const uploadedImg = URL.createObjectURL(file);
            renderCard({title: "Analyzing...", image_url: uploadedImg, bio: "Searching the registry..."}, true);
            toggleView('deck');
            const formData = new FormData();
            formData.append('image', file);
            try {
                const res = await fetch('/api/smart-identify', { method: 'POST', body: formData });
                const result = await res.json();
                renderCard(result.found ? {...result.data, image_url: uploadedImg} : 
                                         {title: result.name || "Unknown", subtitle: "New Species", bio: result.message, image_url: uploadedImg}, false);
            } catch (err) { renderCard({title: "Error", bio: "Upload failed.", image_url: uploadedImg}, false); }
        }
    </script>
</body>
</html>
